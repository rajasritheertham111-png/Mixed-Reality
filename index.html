<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate WebXR Workspace</title>

    <!-- A-Frame and Physics System -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <!-- Fonts & UI Styling -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Inter', sans-serif;
        }

        /* Professional Landing Screen */
        #landing-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1b26 0%, #0d0d0d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
            color: white;
            transition: opacity 0.5s ease;
        }

        #landing-ui h1 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 600;
            background: -webkit-linear-gradient(#7aa2f7, #bb9af7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
        }

        #landing-ui p {
            font-size: 16px;
            color: #a9b1d6;
            max-width: 500px;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.5;
        }

        .mr-btn {
            background: rgba(122, 162, 247, 0.2);
            border: 1px solid #7aa2f7;
            color: #7aa2f7;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .mr-btn:hover {
            background: rgba(122, 162, 247, 0.4);
            box-shadow: 0 0 20px rgba(122, 162, 247, 0.5);
            transform: translateY(-2px);
        }

        /* In-App AR Overlay UI */
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            pointer-events: auto;
            background: rgba(20, 20, 20, 0.7);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, background 0.2s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #7aa2f7;
            color: #111;
            border: 1px solid #7aa2f7;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(12px);
            color: #eaeaea;
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
    </style>

    <script>
        /**
         * STATE MANAGER
         */
        const AppState = {
            mode: 'notes' // 'notes' (walls) or 'furniture' (floors)
        };

        /**
         * SPLASH SCREEN LOGIC
         */
        function startMR() {
            const scene = document.querySelector('a-scene');
            if (scene.hasLoaded) {
                // Hide default A-Frame VR Button
                const xrBtn = document.querySelector('.a-enter-vr');
                if (xrBtn) xrBtn.style.display = 'none';

                // Hide landing UI
                document.getElementById('landing-ui').style.opacity = '0';
                setTimeout(() => document.getElementById('landing-ui').style.display = 'none', 500);

                // Enter WebXR
                scene.enterVR();
            }
        }

        // Show AR Overlays once WebXR session starts
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('a-scene').addEventListener('enter-vr', () => {
                document.getElementById('ui-overlay').style.opacity = '1';
                document.getElementById('status').style.opacity = '1';
            });
        });

        /**
         * UI MODE CHANGER
         */
        function setMode(mode) {
            AppState.mode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
        }

        /**
         * UNIFIED AR HIT-TEST SPAWNER
         * Handles both vertical UI Notes (walls) and horizontal Furniture/Physics (floors)
         */
        AFRAME.registerComponent('ar-unified-spawner', {
            init: function () {
                this.xrHitTestSource = null;
                this.viewerSpace = null;
                this.refSpace = null;
                this.reticle = document.getElementById('reticle');
                this.latestMatrix = null;
                this.latestNormal = new THREE.Vector3();

                this.el.sceneEl.renderer.xr.addEventListener('sessionstart', async (ev) => {
                    const session = this.el.sceneEl.renderer.xr.getSession();
                    if (!session.requestHitTestSource) return;
                    this.refSpace = this.el.sceneEl.renderer.xr.getReferenceSpace();
                    this.viewerSpace = await session.requestReferenceSpace('viewer');
                    this.xrHitTestSource = await session.requestHitTestSource({ space: this.viewerSpace });
                });

                this.el.sceneEl.addEventListener('select', (event) => {
                    if (this.reticle.getAttribute('visible') && this.latestMatrix) {
                        this.spawnBasedOnMode();
                    }
                });
            },

            tick: function (time, frame) {
                if (!this.xrHitTestSource || !frame) return;
                const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);

                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const pose = hit.getPose(this.refSpace);
                    this.latestMatrix = pose.transform.matrix;

                    // Extract normal to determine vertical (wall) vs horizontal (floor)
                    this.latestNormal.fromArray(this.latestMatrix, 4).normalize();
                    const dot = Math.abs(this.latestNormal.y); // close to 0 = wall, close to 1 = floor

                    const isWall = dot < 0.2;
                    const isFloor = dot > 0.8;

                    this.reticle.setAttribute('visible', 'true');
                    const pos = pose.transform.position;
                    this.reticle.setAttribute('position', pos);

                    // Align reticle rotation to surface
                    const rot = new THREE.Quaternion(pose.transform.orientation.x, pose.transform.orientation.y, pose.transform.orientation.z, pose.transform.orientation.w);
                    const euler = new THREE.Euler().setFromQuaternion(rot);
                    this.reticle.setAttribute('rotation', { x: THREE.MathUtils.radToDeg(euler.x), y: THREE.MathUtils.radToDeg(euler.y), z: THREE.MathUtils.radToDeg(euler.z) });

                    // UI Guidance logic
                    const statEl = document.getElementById('status');
                    if (AppState.mode === 'notes') {
                        this.reticle.setAttribute('material', 'color: #ffd166');
                        if (isWall) statEl.innerText = "Aiming at Wall. Trigger to place Sticky Note.";
                        else statEl.innerText = "Find a vertical wall for Sticky Notes.";
                    } else if (AppState.mode === 'furniture') {
                        this.reticle.setAttribute('material', 'color: #7aa2f7');
                        if (isFloor) statEl.innerText = "Aiming at Floor. Trigger to place Furniture.";
                        else statEl.innerText = "Find a flat floor to place Furniture/Sandbox.";
                    }

                } else {
                    this.reticle.setAttribute('visible', 'false');
                    this.latestMatrix = null;
                }
            },

            spawnBasedOnMode: function () {
                const dot = Math.abs(this.latestNormal.y);
                const pos = this.reticle.getAttribute('position');
                const rot = this.reticle.getAttribute('rotation');

                if (AppState.mode === 'notes' && dot < 0.2) {
                    // Wall Logic: Spawn Sticky Note
                    const note = document.createElement('a-entity');
                    note.setAttribute('geometry', 'primitive: box; width: 0.22; height: 0.22; depth: 0.01');
                    note.setAttribute('material', 'color: #ffd166; roughness: 0.6; metalness: 0.1');

                    const textEl = document.createElement('a-entity');
                    textEl.setAttribute('position', '0 0 0.006');
                    textEl.setAttribute('text', 'value: Spatial Note\\nWrite on Walls!\\n(Pinch to move); width: 0.18; align: center; color: #333333; font: kelsonsans');
                    note.appendChild(textEl);

                    note.setAttribute('position', pos);
                    // Keep it flush to the wall based on reticle rotation
                    note.setAttribute('rotation', rot);

                    // Allow dragging (either physics-less drag or standard)
                    note.classList.add('grabbable-note');
                    note.setAttribute('scale', '0 0 0');
                    note.setAttribute('animation', 'property: scale; to: 1 1 1; dur: 400; easing: easeOutElastic');

                    this.el.sceneEl.appendChild(note);

                } else if (AppState.mode === 'furniture' && dot > 0.8) {
                    // Floor Logic: Spawn Physics Sandbox / Jenga Tower
                    const rows = 4;
                    const blockW = 0.05, blockH = 0.03, blockD = 0.15;
                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < 3; x++) {
                            const block = document.createElement('a-entity');
                            block.setAttribute('geometry', `primitive: box; width: ${blockW}; height: ${blockH}; depth: ${blockD}`);
                            block.setAttribute('material', 'color: #9d7cd8; roughness: 0.8');
                            block.setAttribute('shadow', 'cast: true');

                            let posX, posZ, rotY = 0;
                            if (y % 2 === 0) {
                                posX = pos.x + (x - 1) * (blockW + 0.005);
                                posZ = pos.z;
                            } else {
                                posX = pos.x;
                                posZ = pos.z + (x - 1) * (blockW + 0.005);
                                rotY = 90;
                            }

                            block.setAttribute('position', { x: posX, y: pos.y + 0.015 + (y * blockH), z: posZ });
                            block.setAttribute('rotation', `0 ${rotY} 0`);

                            block.setAttribute('dynamic-body', 'mass: 0.5');
                            block.classList.add('grabbable-physics');
                            this.el.sceneEl.appendChild(block);
                        }
                    }

                    // Spawn the invisible shadow plane linked to this location
                    const shadowPlane = document.createElement('a-plane');
                    shadowPlane.setAttribute('position', { x: pos.x, y: pos.y + 0.001, z: pos.z });
                    shadowPlane.setAttribute('rotation', '-90 0 0');
                    shadowPlane.setAttribute('width', '5'); shadowPlane.setAttribute('height', '5');
                    shadowPlane.setAttribute('material', 'shader: shadow; opacity: 0.5');
                    shadowPlane.setAttribute('shadow', 'receive: true');
                    this.el.sceneEl.appendChild(shadowPlane);
                }
            }
        });

        /**
         * UNIFIED PINCH-TO-GRAB
         * Handles both "grabbable-physics" (disables dynamic-body) and "grabbable-note" (no physics, just moves)
         */
        AFRAME.registerComponent('unified-pinch-grab', {
            init: function () {
                this.grabbedEl = null;
                this.isPhysics = false;

                this.el.addEventListener('pinchstarted', (ev) => {
                    const handPos = new THREE.Vector3();
                    this.el.object3D.getWorldPosition(handPos);

                    let nearest = null;
                    let minDist = 0.20; // 20cm grab radius for easier interaction

                    document.querySelectorAll('.grabbable-physics, .grabbable-note').forEach(el => {
                        const objPos = new THREE.Vector3();
                        el.object3D.getWorldPosition(objPos);
                        const dist = handPos.distanceTo(objPos);
                        if (dist < minDist) {
                            minDist = dist;
                            nearest = el;
                        }
                    });

                    if (nearest) {
                        this.grabbedEl = nearest;
                        this.isPhysics = nearest.classList.contains('grabbable-physics');

                        if (this.isPhysics) {
                            // Temporarily remove physics
                            this.grabbedEl.removeAttribute('dynamic-body');
                        }
                    }
                });

                this.el.addEventListener('pinchended', (ev) => {
                    if (this.grabbedEl) {
                        if (this.isPhysics) {
                            // Restore physics
                            this.grabbedEl.setAttribute('dynamic-body', 'mass: 0.5');
                            this.grabbedEl.components['dynamic-body'].syncToPhysics();
                        }
                        this.grabbedEl = null;
                    }
                });
            },
            tick: function () {
                if (this.grabbedEl) {
                    // Parent the object to the hand smoothly
                    const handMatrix = this.el.object3D.matrixWorld;
                    const pos = new THREE.Vector3();
                    const quat = new THREE.Quaternion();
                    const scale = new THREE.Vector3();
                    handMatrix.decompose(pos, quat, scale);

                    this.grabbedEl.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z });

                    if (this.isPhysics) {
                        const e = new THREE.Euler().setFromQuaternion(quat);
                        this.grabbedEl.setAttribute('rotation', {
                            x: THREE.MathUtils.radToDeg(e.x),
                            y: THREE.MathUtils.radToDeg(e.y),
                            z: THREE.MathUtils.radToDeg(e.z)
                        });
                    }
                    // Note for sticky notes: we only update position so it stays flat to the wall!
                }
            }
        });
    </script>
</head>

<body>

    <!-- 1. Landing Screen -->
    <div id="landing-ui">
        <h1>Ultimate WebXR Workspace</h1>
        <p>A unified Mixed Reality app running completely in your browser. Write sticky notes on your real-world walls,
            or spawn physics sandboxes onto your floor!</p>
        <button class="mr-btn" onclick="startMR()">Start Mixed Reality</button>
    </div>

    <!-- 2. System Status Text (AR) -->
    <div id="status">Loading AR Core APIs...</div>

    <!-- 3. Bottom AR Mode Selector -->
    <div id="ui-overlay">
        <button id="btn-notes" class="mode-btn active" onclick="setMode('notes')">Sticky Notes (Walls)</button>
        <button id="btn-furniture" class="mode-btn" onclick="setMode('furniture')">Physics Jenga (Floors)</button>
    </div>

    <!-- A-Frame Scene -->
    <!-- Note: Requesting specific Quest 3 tracking features: depth, hand tracking, planes -->
    <a-scene physics="driver: local; gravity: -9.8; debug: false"
        webxr="optionalFeatures: hit-test, hand-tracking, plane-detection, mesh-detection, depth-sensing; requiredFeatures: local-floor;"
        renderer="colorManagement: true, physicallyCorrectLights: true" xr-mode-ui="enabled: true; XRMode: ar"
        ar-unified-spawner>

        <a-camera position="0 1.6 0"></a-camera>

        <!-- Hand Tracking Entities mapped to our physics-less grab logic -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left; modelStyle: dots" unified-pinch-grab></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right; modelStyle: dots" unified-pinch-grab></a-entity>

        <!-- Lighting setup for Shadows -->
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="1 3 1" intensity="0.8" castShadow="true" shadow-camera-top="5"
            shadow-camera-bottom="-5" shadow-camera-left="-5" shadow-camera-right="5">
        </a-light>

        <!-- Hit Test Reticle -->
        <a-entity id="reticle" visible="false">
            <!-- Glow Ring -->
            <a-ring color="#50e3c2" radius-inner="0.1" radius-outer="0.12" rotation="-90 0 0"
                material="opacity: 0.8; transparent: true"></a-ring>
            <a-circle color="#50e3c2" radius="0.02" rotation="-90 0 0"></a-circle>
        </a-entity>

    </a-scene>

</body>

</html>
